version: 1
# Amplify Yaml for building the frontend
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        # Relative to appRoot, i.e. frontend/build
        baseDirectory: build
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
